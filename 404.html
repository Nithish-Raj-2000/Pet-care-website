<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | STACKLY Premium Pet Care</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="preloader" class="preloader"><div class="paw-loader"><i class="fas fa-paw"></i></div></div>

    <section class="error-section bg-light" style="min-height:100vh;">
        <div class="container">
            <div class="error-content reveal">
                <h1>404</h1>
                <h3 class="title">Oops! Page Not Found</h3>
                <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
                <div class="error-actions mt-5">
                    <button onclick="history.back()" class="btn btn-primary btn-large"><i class="fas fa-arrow-left"></i> Go Back</button>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
